spring.application.name=BACKEND
# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/MOCK_TESTER}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# FLYWAY MIGRATION
# ===============================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ===============================
# DRIVER
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# SERVER PORT
# Render assigns a dynamic PORT env variable — we read it here.
# Falls back to 4040 for local development.
# ===============================
server.port=${PORT:4040}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# FASTAPI AI SERVICE
# In production on Render, set FASTAPI_URL env variable to your deployed AI service URL.
# Falls back to localhost:8000 for local development.
# ===============================
app.fastapi.url=${FASTAPI_URL:http://localhost:8000}
app.fastapi.connect-timeout=10s
app.fastapi.read-timeout=300s